<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Maison · Chatbot Onboarding Prototype</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #060816;
      --panel: rgba(7, 12, 27, 0.95);
      --line: rgba(255,255,255,0.1);
      --text: #f2f5ff;
      --muted: #8ca0c2;
      --accent: #77e5ba;
      --accent-2: #89a7ff;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(137, 167, 255, 0.28), transparent 28%),
        radial-gradient(circle at bottom right, rgba(119, 229, 186, 0.24), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .shell {
      width: min(100%, 1180px);
      height: min(100%, 860px);
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: 18px;
      background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      box-shadow: 0 26px 90px rgba(2, 4, 10, 0.45);
      backdrop-filter: blur(20px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px 6px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
      display: grid;
      place-items: center;
      color: #04121c;
      font-size: 16px;
      font-weight: 800;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
    }

    .frame {
      border: 1px solid var(--line);
      border-radius: 24px;
      overflow: hidden;
      background: #f8f7f3;
      min-height: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #f8f7f3;
    }

    @media (max-width: 760px) {
      body { padding: 10px; }
      .shell {
        height: 100%;
        width: 100%;
        padding: 10px;
        border-radius: 20px;
      }
      .topbar { padding: 8px 10px; }
      .meta { display: none; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">M</div>
        <div>Maison chatbot preview</div>
      </div>
      <div class="meta">local app shell · fullscreen experience</div>
    </header>
    <section class="frame">
      <iframe src="./chatbot-refined.html#bare&short" title="Maison chatbot onboarding prototype"></iframe>
    </section>
  </main>
</body>
</html>
